<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>Preisalarm</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --card: #111; --border: #222;
  --gold: #d4a843; --silver: #a8b8c8; --btc: #f7931a;
  --text: #e8e8e8; --muted: #555; --green: #4caf72; --red: #e05555;
}
body {
  background: var(--bg); color: var(--text);
  font-family: system-ui, sans-serif;
  max-width: 480px; margin: 0 auto; padding: 24px 16px;
  min-height: 100vh;
}
h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.sub { font-size: 11px; color: var(--muted); margin-bottom: 20px; }
.status { font-size: 11px; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
.dot.live { background: var(--green); }

.cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px; display: flex;
  justify-content: space-between; align-items: center;
  border-left: 3px solid;
}
.card.gold { border-left-color: var(--gold); }
.card.silver { border-left-color: var(--silver); }
.card.btc { border-left-color: var(--btc); }
.card-left { display: flex; align-items: center; gap: 12px; }
.icon {
  width: 38px; height: 38px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px;
}
.gold .icon { background: rgba(212,168,67,0.1); color: var(--gold); }
.silver .icon { background: rgba(168,184,200,0.1); color: var(--silver); }
.btc .icon { background: rgba(247,147,26,0.1); color: var(--btc); }
.name { font-weight: 700; font-size: 14px; }
.unit { font-size: 10px; color: var(--muted); margin-top: 2px; }
.card-right { text-align: right; }
.price { font-size: 19px; font-weight: 600; }
.gold .price { color: var(--gold); }
.silver .price { color: var(--silver); }
.btc .price { color: var(--btc); }
.badge { font-size: 10px; color: var(--muted); margin-top: 3px; }
.badge.on { color: var(--green); }
.err { color: var(--red); font-size: 12px; }
.loading { color: var(--muted); font-size: 13px; }

hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
.label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

.form { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 20px; }
.row { display: flex; gap: 8px; margin-bottom: 10px; }
.row:last-child { margin-bottom: 0; }
select, input {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px; padding: 10px 12px;
  font-size: 13px; font-family: inherit; outline: none;
  -webkit-appearance: none;
}
.btn {
  width: 100%; background: var(--text); color: var(--bg);
  border: none; border-radius: 8px; padding: 12px;
  font-size: 14px; font-weight: 700; cursor: pointer;
}
.btn:active { opacity: 0.8; }

.alarms { display: flex; flex-direction: column; gap: 8px; }
.alarm {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.alarm.done { border-color: rgba(76,175,114,0.3); }
.atag { font-size: 10px; font-weight: 600; margin-bottom: 4px; }
.adesc { font-size: 13px; }
.astat { font-size: 10px; color: var(--muted); margin-top: 3px; }
.astat.done { color: var(--green); }
.del {
  background: none; border: 1px solid var(--border); color: var(--muted);
  border-radius: 6px; width: 28px; height: 28px; cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
}
.empty { text-align: center; color: var(--muted); font-size: 12px; padding: 20px; border: 1px dashed var(--border); border-radius: 10px; }

.toast {
  position: fixed; top: 16px; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: #1a2e1f; border: 1px solid var(--green); color: var(--green);
  padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 700;
  transition: transform 0.3s; z-index: 99; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

.refresh {
  float: right; background: var(--card); border: 1px solid var(--border);
  color: var(--muted); border-radius: 7px; width: 34px; height: 34px;
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.refresh.spin { animation: sp 0.8s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
  <h1>⚡ Preisalarm</h1>
  <button class="refresh" id="rbtn" onclick="load()">↻</button>
</div>
<div class="sub">Gold · Silber · Bitcoin in EUR</div>
<div class="status"><div class="dot" id="dot"></div><span id="stxt">Verbinde…</span></div>

<div class="cards">
  <div class="card gold">
    <div class="card-left">
      <div class="icon">Au</div>
      <div><div class="name">Gold</div><div class="unit">pro Unze · EUR</div></div>
    </div>
    <div class="card-right">
      <div class="price" id="pg"><span class="loading">···</span></div>
      <div class="badge" id="bg">–</div>
    </div>
  </div>
  <div class="card silver">
    <div class="card-left">
      <div class="icon">Ag</div>
      <div><div class="name">Silber</div><div class="unit">pro Unze · EUR</div></div>
    </div>
    <div class="card-right">
      <div class="price" id="ps"><span class="loading">···</span></div>
      <div class="badge" id="bs">–</div>
    </div>
  </div>
  <div class="card btc">
    <div class="card-left">
      <div class="icon">₿</div>
      <div><div class="name">Bitcoin</div><div class="unit">pro BTC · EUR</div></div>
    </div>
    <div class="card-right">
      <div class="price" id="pb"><span class="loading">···</span></div>
      <div class="badge" id="bb">–</div>
    </div>
  </div>
</div>

<hr>
<div class="label">Alarm setzen</div>
<div class="form">
  <div class="row">
    <select id="asset">
      <option value="gold">🥇 Gold (€/oz)</option>
      <option value="silver">🥈 Silber (€/oz)</option>
      <option value="btc">₿ Bitcoin (€)</option>
    </select>
  </div>
  <div class="row">
    <select id="dir">
      <option value="below">↓ fällt unter</option>
      <option value="above">↑ steigt über</option>
    </select>
    <input type="number" id="aprice" placeholder="Preis in €" inputmode="decimal" min="0" step="any">
  </div>
  <div class="row">
    <button class="btn" onclick="addAlarm()">+ Alarm hinzufügen</button>
  </div>
</div>

<div class="label">Aktive Alarme</div>
<div class="alarms" id="alist"></div>

<script>
let P = {gold:null, silver:null, btc:null};
let alarms = JSON.parse(localStorage.getItem('pa_v3') || '[]');

const euro = (v, a) => new Intl.NumberFormat('de-DE', {
  style:'currency', currency:'EUR',
  maximumFractionDigits: a==='btc' ? 0 : 2,
  minimumFractionDigits: a==='btc' ? 0 : 2
}).format(v);

async function load() {
  const btn = document.getElementById('rbtn');
  btn.classList.add('spin');
  document.getElementById('stxt').textContent = 'Aktualisiere…';

  let ok = 0;

  // Alle Kurse via coinbase (BTC) und corsproxy+stooq (Gold/Silber)
  const proxy = 'https://corsproxy.io/?';

  // Bitcoin via Coinbase
  try {
    const r = await fetch(proxy + encodeURIComponent('https://api.coinbase.com/v2/prices/BTC-EUR/spot'));
    const d = await r.json();
    P.btc = parseFloat(d.data.amount);
    document.getElementById('pb').textContent = euro(P.btc, 'btc');
    ok++;
  } catch(e) {
    document.getElementById('pb').innerHTML = '<span class="err">Fehler</span>';
  }

  // Gold via corsproxy + stooq
  try {
    const r = await fetch(proxy + encodeURIComponent('https://stooq.com/q/l/?s=xaueur&f=l'));
    const t = await r.text();
    const gold = parseFloat(t.trim());
    if (!gold || isNaN(gold)) throw new Error('bad');
    P.gold = gold;
    document.getElementById('pg').textContent = euro(P.gold, 'gold');
    ok++;
  } catch(e) {
    document.getElementById('pg').innerHTML = '<span class="err">Fehler</span>';
  }

  // Silber via corsproxy + stooq
  try {
    const r = await fetch(proxy + encodeURIComponent('https://stooq.com/q/l/?s=xageur&f=l'));
    const t = await r.text();
    const silver = parseFloat(t.trim());
    if (!silver || isNaN(silver)) throw new Error('bad');
    P.silver = silver;
    document.getElementById('ps').textContent = euro(P.silver, 'silver');
    ok++;
  } catch(e) {
    document.getElementById('ps').innerHTML = '<span class="err">Fehler</span>';
  }

  const now = new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  const dot = document.getElementById('dot');
  if (ok > 0) {
    dot.className = 'dot live';
    document.getElementById('stxt').textContent = `Zuletzt: ${now} · Auto alle 60s`;
  } else {
    dot.className = 'dot';
    document.getElementById('stxt').textContent = 'Keine Verbindung';
  }

  btn.classList.remove('spin');
  checkAlarms();
  updateBadges();
}

function addAlarm() {
  const asset = document.getElementById('asset').value;
  const dir = document.getElementById('dir').value;
  const inp = document.getElementById('aprice');
  const price = parseFloat(inp.value);
  if (!price || price <= 0) { inp.style.borderColor='var(--red)'; setTimeout(()=>inp.style.borderColor='',1500); return; }
  alarms.push({id:Date.now(), asset, dir, price, done:false});
  save(); render(); updateBadges();
  inp.value = '';
  toast('Alarm gesetzt ✓');
  if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
}

function delAlarm(id) {
  alarms = alarms.filter(a => a.id !== id);
  save(); render(); updateBadges();
}

function checkAlarms() {
  let changed = false;
  alarms.forEach(a => {
    if (a.done) return;
    const cur = P[a.asset];
    if (!cur) return;
    const hit = a.dir === 'below' ? cur <= a.price : cur >= a.price;
    if (hit) {
      a.done = true; changed = true;
      const n = {gold:'Gold',silver:'Silber',btc:'Bitcoin'}[a.asset];
      const d = a.dir === 'below' ? 'unter' : 'über';
      const msg = `🔔 ${n} ${d} ${euro(a.price, a.asset)}!`;
      toast(msg);
      if ('vibrate' in navigator) navigator.vibrate([300,100,300]);
      if ('Notification' in window && Notification.permission === 'granted')
        new Notification('Preisalarm!', {body: msg.replace('🔔 ','')});
    }
  });
  if (changed) { save(); render(); }
}

function render() {
  const el = document.getElementById('alist');
  if (!alarms.length) { el.innerHTML = '<div class="empty">Noch keine Alarme gesetzt</div>'; return; }
  const colors = {gold:'var(--gold)',silver:'var(--silver)',btc:'var(--btc)'};
  const names = {gold:'Gold',silver:'Silber',btc:'Bitcoin'};
  el.innerHTML = [...alarms].reverse().map(a => `
    <div class="alarm ${a.done?'done':''}">
      <div>
        <div class="atag" style="color:${colors[a.asset]}">${names[a.asset]}</div>
        <div class="adesc">${a.dir==='below'?'↓ unter':'↑ über'} ${euro(a.price, a.asset)}</div>
        <div class="astat ${a.done?'done':''}">${a.done?'✓ Ausgelöst':'⏳ Wartet…'}</div>
      </div>
      <button class="del" onclick="delAlarm(${a.id})">×</button>
    </div>`).join('');
}

function updateBadges() {
  ['gold','silver','btc'].forEach(a => {
    const n = alarms.filter(x => x.asset===a && !x.done).length;
    const el = document.getElementById('b'+a[0]+(a==='btc'?'tc':a==='gold'?'g':'s'));
    // use correct ids: bg, bs, bb
  });
  const ids = {gold:'bg', silver:'bs', btc:'bb'};
  Object.entries(ids).forEach(([a, id]) => {
    const n = alarms.filter(x => x.asset===a && !x.done).length;
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = n > 0 ? `${n} Alarm${n>1?'e':''} aktiv` : 'Kein Alarm';
    el.className = 'badge' + (n > 0 ? ' on' : '');
  });
}

let tt;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(tt); tt = setTimeout(() => t.classList.remove('show'), 4000);
}

function save() { localStorage.setItem('pa_v3', JSON.stringify(alarms)); }

render(); updateBadges(); load();
setInterval(load, 60000);
</script>
</body>
</html>
