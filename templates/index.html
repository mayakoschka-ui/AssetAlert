<!DOCTYPE html><html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#0d0d0d"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="AssetAlert"/>
<link rel="manifest" href="/static/manifest.json"/>
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png"/>
<title>AssetAlert</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
--gold:#D4AF37;--gold-b:#F0CC50;--gold-d:#8a7020;
--bg:#0d0d0d;--card:#181818;--card2:#202020;--row:#252525;
--text:#f5f1e8;--mid:#c5bca8;--dim:#6e6558;
--green:#4ade80;--red:#f87171;--gb:rgba(212,175,55,.22);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:Inter,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{min-height:100dvh;display:flex;flex-direction:column}
header{display:flex;align-items:center;gap:10px;padding:12px 14px 10px;border-bottom:1px solid var(--gb);background:var(--card);position:sticky;top:0;z-index:50}
.logo{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--gold);background:#0d0d0d;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(212,175,55,.3);flex-shrink:0}
.logo svg{width:18px;height:18px}
.htitle{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:3px;color:var(--gold);line-height:1}
.hsub{font-size:9px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.hright{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mid);font-family:"Space Mono",monospace}
.dot{width:7px;height:7px;border-radius:50%;background:var(--dim);transition:background .4s}
.dot.live{background:var(--green);animation:blink 2s infinite}
.dot.error{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.infobar{display:flex;justify-content:space-between;align-items:center;padding:5px 14px;font-size:10px;color:var(--dim);background:var(--card);border-bottom:1px solid rgba(255,255,255,.04);font-family:"Space Mono",monospace}
.infobar span{color:var(--mid)}
.pbar{height:2px;background:rgba(255,255,255,.05);position:relative;overflow:hidden}
.pbar-fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--gold-d),var(--gold));transition:width 1s linear}
main{flex:1;padding:10px 10px 16px;display:flex;flex-direction:column;gap:10px;max-width:520px;margin:0 auto;width:100%}
.card{background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:14px;overflow:hidden}
.card.flash{animation:cflash .7s ease}
@keyframes cflash{0%,100%{box-shadow:0 0 18px rgba(212,175,55,.2)}50%{box-shadow:0 0 40px rgba(212,175,55,.6)}}
.prow{display:flex;align-items:center;justify-content:space-between;padding:13px 14px 11px}
.aname{font-family:"Bebas Neue",sans-serif;font-size:26px;letter-spacing:2.5px;color:var(--text);line-height:1}
.asub{font-size:10px;color:var(--mid);letter-spacing:.8px;margin-top:2px}
.pval{font-family:"Space Mono",monospace;font-size:22px;font-weight:700;color:var(--gold-b);line-height:1;text-align:right}
.pval.up{color:var(--green)}.pval.dn{color:var(--red)}
.pval.ldg{color:var(--dim);font-size:13px;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%,100%{opacity:1}50%{opacity:.3}}
.punit{font-size:10px;color:var(--mid);margin-top:3px;text-align:right}
.asec{border-top:1px solid rgba(255,255,255,.06);padding:10px 12px 12px;background:var(--card2)}
.asec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.asec-title{font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--mid);font-weight:600}
.btn-add{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--gold);background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.28);border-radius:16px;padding:4px 10px;cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:Inter,sans-serif;transition:background .15s}
.btn-add:active{background:rgba(212,175,55,.22)}
.btn-add svg{width:11px;height:11px;flex-shrink:0}
.alist{display:flex;flex-direction:column;gap:6px}
.arow{display:grid;grid-template-columns:36px 1fr auto 24px;align-items:center;gap:6px;background:var(--row);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:7px 10px;transition:border-color .25s,background .25s}
.arow.th{border-color:rgba(248,113,113,.4);background:rgba(248,113,113,.06)}
.arow.tl{border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.06)}
.dir-btn{width:32px;height:32px;border-radius:7px;border:1px solid rgba(255,255,255,.1);background:var(--card2);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;color:var(--mid);flex-shrink:0}
.dir-btn.high{color:var(--red);border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.08)}
.dir-btn.low{color:var(--green);border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.08)}
.ainput-wrap{display:flex;align-items:center;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.09);border-radius:8px;overflow:hidden;min-width:0}
.ainput-wrap:focus-within{border-color:var(--gold-d)}
.ainput-wrap input{flex:1;background:transparent;border:none;color:var(--text);font-family:"Space Mono",monospace;font-size:15px;font-weight:700;padding:8px;outline:none;width:100%;min-width:0}
.ainput-wrap input::placeholder{color:var(--dim);font-weight:400;font-size:12px}
.acur{font-size:11px;color:var(--mid);padding:0 8px 0 2px;font-family:"Space Mono",monospace;white-space:nowrap}
.abadge{font-size:9px;font-weight:700;letter-spacing:.8px;padding:2px 6px;border-radius:8px;white-space:nowrap;display:none}
.abadge.show{display:inline-flex;align-items:center;gap:3px}
.abadge.bh{background:rgba(248,113,113,.15);color:var(--red)}
.abadge.bl{background:rgba(74,222,128,.12);color:var(--green)}
.btn-del{width:24px;height:24px;border-radius:5px;border:none;background:transparent;color:var(--dim);font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.btn-del:active{color:var(--red)}
footer{padding:10px 14px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;background:var(--card)}
.fupd{font-size:10px;color:var(--mid);font-family:"Space Mono",monospace}
.snd-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--mid);cursor:pointer;padding:7px 12px;border-radius:16px;border:1px solid rgba(255,255,255,.1);background:var(--card2);transition:all .2s;-webkit-tap-highlight-color:transparent;font-family:Inter,sans-serif}
.snd-btn.on{color:var(--gold);border-color:var(--gold-d);background:rgba(212,175,55,.08)}
.snd-btn svg{width:15px;height:15px}
.toasts{position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:99;display:flex;flex-direction:column;gap:6px;width:calc(100% - 20px);max-width:480px;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--gold);border-radius:10px;padding:11px 13px;display:flex;align-items:flex-start;gap:10px;box-shadow:0 8px 28px rgba(0,0,0,.6);animation:tin .35s cubic-bezier(.34,1.56,.64,1) forwards;pointer-events:all}
.toast.out{animation:tout .25s ease forwards}
@keyframes tin{from{opacity:0;transform:translateY(-14px) scale(.93)}to{opacity:1;transform:none}}
@keyframes tout{from{opacity:1;transform:none}to{opacity:0;transform:translateY(-14px) scale(.93)}}
.tlabel{font-family:"Bebas Neue",sans-serif;font-size:15px;letter-spacing:2px;color:var(--gold);padding-top:1px;white-space:nowrap}
.ttitle{font-weight:600;font-size:13px;color:var(--text);margin-bottom:2px}
.tmsg{font-size:11px;color:var(--mid)}
@media(max-width:360px){.pval{font-size:19px}.aname{font-size:22px}.ainput-wrap input{font-size:14px}}
</style>
</head>
<body>
<header>
<div class="logo">
<svg viewBox="0 0 24 24" fill="none">
<polygon points="13,2 3,14 12,14 11,22 21,10 12,10" fill="#D4AF37"/>
</svg>
</div>
<div>
<div class="htitle">AssetAlert</div>
<div class="hsub">Live Preise &amp; Alarme</div>
</div>
<div class="hright">
<div class="dot" id="sDot"></div>
<span id="sTxt">--</span>
</div>
</header>
<div class="infobar">
<span>EUR/USD: <span id="eurDisp">...</span></span>
<span id="updTxt">--</span>
</div>
<div class="pbar"><div class="pbar-fill" id="pbarFill" style="width:0%"></div></div>
<div class="toasts" id="toastWrap"></div>
<main>
<div class="card" id="crd-gold">
<div class="prow">
<div><div class="aname">Gold</div><div class="asub">XAU / oz</div></div>
<div><div class="pval ldg" id="pv-gold">...</div><div class="punit">EUR / oz</div></div>
</div>
<div class="asec">
<div class="asec-hdr"><span class="asec-title">Preisalarme</span>
<button class="btn-add" onclick="addAlarm('gold')">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Alarm
</button>
</div>
<div class="alist" id="al-gold"></div>
</div>
</div>
<div class="card" id="crd-silver">
<div class="prow">
<div><div class="aname">Silber</div><div class="asub">XAG / oz</div></div>
<div><div class="pval ldg" id="pv-silver">...</div><div class="punit">EUR / oz</div></div>
</div>
<div class="asec">
<div class="asec-hdr"><span class="asec-title">Preisalarme</span>
<button class="btn-add" onclick="addAlarm('silver')">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Alarm
</button>
</div>
<div class="alist" id="al-silver"></div>
</div>
</div>
<div class="card" id="crd-bitcoin">
<div class="prow">
<div><div class="aname">Bitcoin</div><div class="asub">BTC-USD</div></div>
<div><div class="pval ldg" id="pv-bitcoin">...</div><div class="punit">EUR / BTC</div></div>
</div>
<div class="asec">
<div class="asec-hdr"><span class="asec-title">Preisalarme</span>
<button class="btn-add" onclick="addAlarm('bitcoin')">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Alarm
</button>
</div>
<div class="alist" id="al-bitcoin"></div>
</div>
</div>
</main>
<footer>
<div class="fupd" id="fupd">--</div>
<button class="snd-btn on" id="sndBtn" onclick="toggleSound()">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
<path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
<path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
</svg>
Sound AN
</button>
</footer>
<script>
const ASSETS=['gold','silver','bitcoin'];
const NAMES={gold:'Gold',silver:'Silber',bitcoin:'Bitcoin'};
const STEPS={gold:1,silver:0.5,bitcoin:100};
let eurPrices={gold:null,silver:null,bitcoin:null};
let prevEUR={gold:null,silver:null,bitcoin:null};
let eurRate=null,soundOn=true,triggered={},countdown=60,cdTimer=null,idCnt=0,fetching=false;
let alarms={gold:[],silver:[],bitcoin:[]};

let actx=null;
function getActx(){
if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
if(actx.state==='suspended')actx.resume();
return actx;
}
function beep(dir){
if(!soundOn)return;
try{
const c=getActx(),t=c.currentTime;
const notes=dir==='high'?[880,1047,1319]:[659,523,392];
notes.forEach((f,i)=>{
const o=c.createOscillator(),g=c.createGain();
o.connect(g);g.connect(c.destination);
o.type='sine';o.frequency.setValueAtTime(f,t+i*.15);
g.gain.setValueAtTime(0,t+i*.15);
g.gain.linearRampToValueAtTime(.42,t+i*.15+.02);
g.gain.exponentialRampToValueAtTime(.001,t+i*.15+.45);
o.start(t+i*.15);o.stop(t+i*.15+.55);
});
}catch(e){}
}

function fmtEUR(a,v){
if(v===null||v===undefined)return '--';
return v.toLocaleString('de-DE',{style:'currency',currency:'EUR',
minimumFractionDigits:a==='bitcoin'?0:2,
maximumFractionDigits:a==='bitcoin'?0:2});
}

function setPrice(a,eur){
const el=document.getElementById('pv-'+a);
el.classList.remove('ldg','up','dn');
el.textContent=fmtEUR(a,eur);
if(prevEUR[a]!==null&&eur!==null){
el.classList.add(eur>prevEUR[a]?'up':eur<prevEUR[a]?'dn':'');
setTimeout(()=>el.classList.remove('up','dn'),2000);
}
}

function renderAlarms(a){
const list=document.getElementById('al-'+a);
list.innerHTML='';
alarms[a].forEach(al=>{
const row=document.createElement('div');
row.className='arow';row.id='ar-'+al.id;
const dirLabel=al.dir==='high'?'&#9650;':'&#9660;';
row.innerHTML=
'<button class="dir-btn '+al.dir+'" onclick="flipDir(\''+a+'\','+al.id+')" title="Richtung">'+dirLabel+'</button>'+
'<div class="ainput-wrap">'+
'<input type="number" inputmode="decimal" placeholder="'+(al.dir==='high'?'Ueber':'Unter')+' EUR" min="0" step="'+STEPS[a]+'"'+
(al.val!==null?' value="'+al.val+'"':'')+
' oninput="setVal(\''+a+'\','+al.id+',this.value)"'+
' onchange="save();recheck(\''+a+'\')">'+
'<span class="acur">EUR</span></div>'+
'<span class="abadge" id="ab-'+al.id+'"></span>'+
'<button class="btn-del" onclick="delAlarm(\''+a+'\','+al.id+')" title="Loeschen">x</button>';
list.appendChild(row);
refreshBadge(a,al);
});
}

function addAlarm(a){
const id=++idCnt;
alarms[a].push({id,dir:'high',val:null});
renderAlarms(a);save();
setTimeout(()=>{
const ins=document.querySelectorAll('#al-'+a+' input');
if(ins.length)ins[ins.length-1].focus();
},50);
}

function delAlarm(a,id){
alarms[a]=alarms[a].filter(x=>x.id!==id);
delete triggered[a+id+'high'];delete triggered[a+id+'low'];
renderAlarms(a);save();
}

function flipDir(a,id){
const al=alarms[a].find(x=>x.id===id);
if(!al)return;
al.dir=al.dir==='high'?'low':'high';
delete triggered[a+id+'high'];delete triggered[a+id+'low'];
renderAlarms(a);save();recheck(a);
}

function setVal(a,id,raw){
const al=alarms[a].find(x=>x.id===id);
if(al)al.val=raw===''?null:parseFloat(raw);
}

function refreshBadge(a,al){
const badge=document.getElementById('ab-'+al.id);
const row=document.getElementById('ar-'+al.id);
if(!badge||!row)return;
const p=eurPrices[a];
const hit=(al.val!==null&&p!==null)&&
((al.dir==='high'&&p>=al.val)||(al.dir==='low'&&p<=al.val));
badge.className='abadge'+(hit?' show '+(al.dir==='high'?'bh':'bl'):'');
badge.textContent=hit?'AKTIV':'';
row.className='arow'+(hit?(al.dir==='high'?' th':' tl'):'');
}

function recheck(a){
const p=eurPrices[a];
if(p===null)return;
const card=document.getElementById('crd-'+a);
alarms[a].forEach(al=>{
if(al.val===null)return;
const k=a+al.id+al.dir;
const hit=(al.dir==='high'&&p>=al.val)||(al.dir==='low'&&p<=al.val);
if(hit&&!triggered[k]){
triggered[k]=true;beep(al.dir);toast(a,al.dir,p,al.val);
card.classList.add('flash');
setTimeout(()=>card.classList.remove('flash'),1400);
}else if(!hit){delete triggered[k];}
refreshBadge(a,al);
});
}

function toast(a,dir,cur,tgt){
const w=document.getElementById('toastWrap');
const d=document.createElement('div');
d.className='toast';
d.innerHTML='<div class="tlabel">'+NAMES[a]+'</div>'+
'<div><div class="ttitle">Preisalarm!</div>'+
'<div class="tmsg">'+NAMES[a]+' '+(dir==='high'?'ueber':'unter')+' '+fmtEUR(a,tgt)+' -- Jetzt: '+fmtEUR(a,cur)+'</div></div>';
w.appendChild(d);
setTimeout(()=>{d.classList.add('out');setTimeout(()=>d.remove(),280);},5000);
}

function setStatus(s){
document.getElementById('sDot').className='dot '+s;
document.getElementById('sTxt').textContent=s==='live'?'LIVE':s==='error'?'FEHLER':'--';
}

async function fetchEUR(){
try{const r=await fetch('https://api.frankfurter.app/latest?from=EUR&to=USD');const d=await r.json();return 1.0/d.rates.USD;}catch(e){}
try{const r=await fetch('https://open.er-api.com/v6/latest/USD');const d=await r.json();return d.rates.EUR;}catch(e){}
return null;
}

async function fetchGoldSilver(){
try{
const r=await fetch('https://metals.live/api/v1/spot');
const data=await r.json();
let obj=Array.isArray(data)?data.find(x=>x.gold)||{}:data;
if(obj.gold&&obj.silver)return{gold:parseFloat(obj.gold),silver:parseFloat(obj.silver)};
}catch(e){}
return{gold:null,silver:null};
}

async function fetchBTC(){
try{const r=await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');const d=await r.json();return parseFloat(d.price);}catch(e){}
try{const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');const d=await r.json();return d.bitcoin.usd;}catch(e){}
try{const r=await fetch('https://api.kraken.com/0/public/Ticker?pair=XBTUSD');const d=await r.json();return parseFloat(Object.values(d.result)[0].c[0]);}catch(e){}
return null;
}

async function fetchAll(){
if(fetching)return;
fetching=true;
try{
const[rate,metals,btc]=await Promise.all([fetchEUR(),fetchGoldSilver(),fetchBTC()]);
if(rate){eurRate=rate;document.getElementById('eurDisp').textContent='1 USD = '+eurRate.toFixed(4)+' EUR';}
let ok=false;
for(const[a,usd]of[['gold',metals.gold],['silver',metals.silver],['bitcoin',btc]]){
if(usd&&eurRate){prevEUR[a]=eurPrices[a];eurPrices[a]=usd*eurRate;setPrice(a,eurPrices[a]);recheck(a);ok=true;}
}
setStatus(ok?'live':'error');
}catch(e){setStatus('error');}
finally{fetching=false;}
}

const IV=60;
function startCD(){
countdown=IV;
if(cdTimer)clearInterval(cdTimer);
cdTimer=setInterval(()=>{
countdown--;
document.getElementById('pbarFill').style.width=((IV-countdown)/IV*100).toFixed(1)+'%';
const t='Aktualisierung in '+countdown+'s';
document.getElementById('fupd').textContent=t;
document.getElementById('updTxt').textContent=t;
if(countdown<=0){clearInterval(cdTimer);fetchAll().then(()=>startCD());}
},1000);
}

function toggleSound(){
soundOn=!soundOn;
const b=document.getElementById('sndBtn');
getActx();
b.className='snd-btn'+(soundOn?' on':'');
b.innerHTML=soundOn
?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg> Sound AN'
:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg> Sound AUS';
if(soundOn)beep('high');
}

function save(){
try{localStorage.setItem('aa3',JSON.stringify({alarms,idCnt}));}catch(e){}
}
function load(){
try{
const r=localStorage.getItem('aa3');
if(!r)return;
const p=JSON.parse(r);
if(p.idCnt)idCnt=p.idCnt;
if(p.alarms)ASSETS.forEach(a=>{if(Array.isArray(p.alarms[a]))alarms[a]=p.alarms[a];});
}catch(e){}
ASSETS.forEach(a=>renderAlarms(a));
}

load();
setStatus('');
fetchAll().then(()=>startCD());
</script>
</body>
</html>
